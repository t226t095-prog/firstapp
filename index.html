<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Falling Block Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        #gameCanvas, #holdCanvas, #holdCanvasMobile, #nextCanvas, #nextCanvasMobile {
            background-color: #1a202c;
        }
    </style>
</head>
<body class="bg-gray-800 text-white min-h-screen flex flex-col items-center justify-center font-sans select-none py-2">

    <h1 class="text-2xl md:text-4xl font-bold mb-2 md:mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
        ブロックパズル
    </h1>

    <div class="flex flex-col md:flex-row gap-2 md:gap-6 items-center md:items-start justify-center w-full max-w-4xl px-2">
        
        <!-- モバイル用ステータスヘッダー -->
        <div class="md:hidden flex flex-row w-full justify-between gap-2 max-w-[320px] mb-1">
            <div class="bg-gray-900 p-2 rounded-lg border-2 border-gray-700 shadow-inner flex flex-col items-center w-[72px]">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Hold</p>
                <canvas id="holdCanvasMobile" width="56" height="56" class="rounded"></canvas>
            </div>
            
            <div class="bg-gray-900 p-2 rounded-lg border-2 border-gray-700 shadow-inner flex-1 flex flex-col justify-center items-center relative">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Score</p>
                <p id="scoreDisplayMobile" class="text-xl font-mono text-yellow-400">0</p>
                <!-- モバイル用リセットボタン（小さく配置） -->
                <button onclick="confirmReset()" class="absolute top-1 right-1 text-gray-500 hover:text-white p-1" title="リセット">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>

            <div class="bg-gray-900 p-2 rounded-lg border-2 border-gray-700 shadow-inner flex flex-col items-center w-[72px]">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Next</p>
                <canvas id="nextCanvasMobile" width="56" height="150" class="rounded"></canvas>
            </div>
        </div>

        <!-- PC用 左パネル -->
        <div class="hidden md:flex flex-col gap-4 w-32 items-end">
            <div class="bg-gray-900 p-3 rounded-lg border-2 border-gray-700 shadow-inner flex flex-col items-center">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Hold</p>
                <canvas id="holdCanvas" width="96" height="96" class="rounded"></canvas>
            </div>
            <div class="bg-gray-900 p-4 rounded-lg border-2 border-gray-700 shadow-inner w-full relative">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1 text-center">Score</p>
                <p id="scoreDisplay" class="text-2xl font-mono text-yellow-400 text-center">0</p>
            </div>
        </div>

        <!-- 中央パネル -->
        <div class="relative">
            <canvas id="gameCanvas" class="border-4 border-gray-600 rounded-lg shadow-2xl"></canvas>
            
            <div id="gameOverScreen" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center rounded-lg z-10">
                <h2 class="text-3xl font-bold text-red-500 mb-2">GAME OVER</h2>
                <p class="mb-4">Score: <span id="finalScore" class="font-bold text-yellow-400">0</span></p>
                <button onclick="startGame()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-full font-bold transition-colors mb-2">
                    もう一度プレイ
                </button>
            </div>

            <!-- カスタム確認ダイアログ (iframe内でのconfirm回避のため) -->
            <div id="resetConfirmDialog" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center rounded-lg z-20">
                <div class="bg-gray-800 p-6 rounded-lg border-2 border-gray-600 text-center shadow-xl">
                    <h3 class="text-xl font-bold mb-4">最初からやり直しますか？</h3>
                    <div class="flex gap-4 justify-center">
                        <button onclick="executeReset()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded font-bold transition-colors">はい</button>
                        <button onclick="cancelReset()" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded font-bold transition-colors">いいえ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PC用 右パネル -->
        <div class="hidden md:flex flex-col gap-4 w-48">
            <div class="bg-gray-900 p-3 rounded-lg border-2 border-gray-700 shadow-inner flex flex-col items-center w-32">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Next</p>
                <canvas id="nextCanvas" width="96" height="260" class="rounded"></canvas>
            </div>

            <div class="bg-gray-900 p-4 rounded-lg border-2 border-gray-700">
                <p class="text-gray-400 text-xs font-bold mb-2 uppercase tracking-wider">操作方法</p>
                <ul class="text-xs space-y-2 text-gray-300">
                    <li><kbd class="bg-gray-700 px-1 py-1 rounded">←</kbd> <kbd class="bg-gray-700 px-1 py-1 rounded">→</kbd> : 移動</li>
                    <li><kbd class="bg-gray-700 px-1 py-1 rounded">↑</kbd> : 一気に落下</li>
                    <li><kbd class="bg-gray-700 px-1 py-1 rounded">↓</kbd> : 即固定/落下</li>
                    <li><kbd class="bg-gray-700 px-1 py-1 rounded">Z</kbd> <kbd class="bg-gray-700 px-1 py-1 rounded">X</kbd> : 回転</li>
                    <li><kbd class="bg-gray-700 px-1 py-1 rounded">C</kbd> : ホールド</li>
                </ul>
                <!-- PC用リセットボタン -->
                <button onclick="confirmReset()" class="mt-4 w-full py-1 bg-red-800 hover:bg-red-700 text-xs font-bold rounded flex justify-center items-center gap-1 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    リセット
                </button>
            </div>
        </div>
    </div>

    <!-- スマホ・タブレット用オンスクリーンコントローラー -->
    <div class="md:hidden mt-2 flex flex-col gap-2 w-full max-w-[320px] px-4">
        <div class="flex justify-between gap-2">
            <button onmousedown="playerHold()" ontouchstart="event.preventDefault(); playerHold()" class="bg-purple-600 hover:bg-purple-500 active:bg-purple-400 px-4 py-2 rounded-lg flex-1 font-bold shadow-lg text-sm">
                HOLD
            </button>
            <button onmousedown="playerHardDrop()" ontouchstart="event.preventDefault(); playerHardDrop()" class="bg-red-600 hover:bg-red-500 active:bg-red-400 px-4 py-2 rounded-lg flex-1 font-bold shadow-lg flex justify-center items-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <button onmousedown="playerMove(-1); startAutoMove(-1);" onmouseup="stopAutoMove()" onmouseleave="stopAutoMove()" ontouchstart="event.preventDefault(); playerMove(-1); startAutoMove(-1);" ontouchend="event.preventDefault(); stopAutoMove()" class="bg-gray-700 hover:bg-gray-600 active:bg-gray-500 p-3 rounded-lg flex justify-center items-center shadow-lg">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <button onmousedown="playerDrop(); startAutoDrop();" onmouseup="stopAutoDrop()" onmouseleave="stopAutoDrop()" ontouchstart="event.preventDefault(); playerDrop(); startAutoDrop();" ontouchend="event.preventDefault(); stopAutoDrop()" class="bg-gray-700 hover:bg-gray-600 active:bg-gray-500 p-3 rounded-lg flex justify-center items-center shadow-lg">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </button>
            <button onmousedown="playerMove(1); startAutoMove(1);" onmouseup="stopAutoMove()" onmouseleave="stopAutoMove()" ontouchstart="event.preventDefault(); playerMove(1); startAutoMove(1);" ontouchend="event.preventDefault(); stopAutoMove()" class="bg-gray-700 hover:bg-gray-600 active:bg-gray-500 p-3 rounded-lg flex justify-center items-center shadow-lg">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-2">
            <button onmousedown="playerRotate(-1)" ontouchstart="event.preventDefault(); playerRotate(-1)" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-400 p-2 rounded-lg flex justify-center items-center shadow-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v5h5"></path></svg>
            </button>
            <button onmousedown="playerRotate(1)" ontouchstart="event.preventDefault(); playerRotate(1)" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-400 p-2 rounded-lg flex justify-center items-center shadow-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 3v5h-5"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const holdCanvas = document.getElementById('holdCanvas');
        const holdCtx = holdCanvas?.getContext('2d');
        const holdCanvasMobile = document.getElementById('holdCanvasMobile');
        const holdCtxMobile = holdCanvasMobile?.getContext('2d');

        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas?.getContext('2d');
        const nextCanvasMobile = document.getElementById('nextCanvasMobile');
        const nextCtxMobile = nextCanvasMobile?.getContext('2d');
        
        const scoreElement = document.getElementById('scoreDisplay');
        const scoreElementMobile = document.getElementById('scoreDisplayMobile');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const resetConfirmDialog = document.getElementById('resetConfirmDialog');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 24;

        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;

        const COLORS = [
            null,
            '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF',
            '#FF8E0D', '#FFE138', '#3877FF'
        ];

        const SHAPES = [
            [],
            [[0, 1, 0], [1, 1, 1], [0, 0, 0]], // T
            [[0, 0, 0, 0], [2, 2, 2, 2], [0, 0, 0, 0], [0, 0, 0, 0]], // I
            [[0, 3, 3], [3, 3, 0], [0, 0, 0]], // S
            [[4, 4, 0], [0, 4, 4], [0, 0, 0]], // Z
            [[0, 0, 5], [5, 5, 5], [0, 0, 0]], // L
            [[6, 6], [6, 6]], // O
            [[7, 0, 0], [7, 7, 7], [0, 0, 0]]  // J
        ];

        const WALL_KICKS = {
            normal: {
                '0_1': [{x:0,y:0}, {x:-1,y:0}, {x:-1,y:-1}, {x:0,y:2}, {x:-1,y:2}],
                '1_0': [{x:0,y:0}, {x:1,y:0}, {x:1,y:1}, {x:0,y:-2}, {x:1,y:-2}],
                '1_2': [{x:0,y:0}, {x:1,y:0}, {x:1,y:1}, {x:0,y:-2}, {x:1,y:-2}],
                '2_1': [{x:0,y:0}, {x:-1,y:0}, {x:-1,y:-1}, {x:0,y:2}, {x:-1,y:2}],
                '2_3': [{x:0,y:0}, {x:1,y:0}, {x:1,y:-1}, {x:0,y:2}, {x:1,y:2}],
                '3_2': [{x:0,y:0}, {x:-1,y:0}, {x:-1,y:1}, {x:0,y:-2}, {x:-1,y:-2}],
                '3_0': [{x:0,y:0}, {x:-1,y:0}, {x:-1,y:1}, {x:0,y:-2}, {x:-1,y:-2}],
                '0_3': [{x:0,y:0}, {x:1,y:0}, {x:1,y:-1}, {x:0,y:2}, {x:1,y:2}]
            },
            i_piece: {
                '0_1': [{x:0,y:0}, {x:-2,y:0}, {x:1,y:0}, {x:-2,y:1}, {x:1,y:-2}],
                '1_0': [{x:0,y:0}, {x:2,y:0}, {x:-1,y:0}, {x:2,y:-1}, {x:-1,y:2}],
                '1_2': [{x:0,y:0}, {x:-1,y:0}, {x:2,y:0}, {x:-1,y:-2}, {x:2,y:1}],
                '2_1': [{x:0,y:0}, {x:1,y:0}, {x:-2,y:0}, {x:1,y:2}, {x:-2,y:-1}],
                '2_3': [{x:0,y:0}, {x:2,y:0}, {x:-1,y:0}, {x:2,y:-1}, {x:-1,y:2}],
                '3_2': [{x:0,y:0}, {x:-2,y:0}, {x:1,y:0}, {x:-2,y:1}, {x:1,y:-2}],
                '3_0': [{x:0,y:0}, {x:1,y:0}, {x:-2,y:0}, {x:1,y:2}, {x:-2,y:-1}],
                '0_3': [{x:0,y:0}, {x:-1,y:0}, {x:2,y:0}, {x:-1,y:-2}, {x:2,y:1}]
            }
        };

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        let board = createMatrix(COLS, ROWS);
        let score = 0;
        let gameOver = false;
        let isPaused = false; // ダイアログ表示中のポーズフラグ
        let animationId;

        let holdPieceIndex = 0;
        let canHold = true;
        let pieceBag = []; 

        let dropCounter = 0;
        let dropInterval = 1000;
        let lockCounter = 0;
        const lockDelay = 500;
        let lastTime = 0;

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            pieceIndex: 0,
            rot: 0
        };

        function updateScoreDisplay() {
            if(scoreElement) scoreElement.innerText = score;
            if(scoreElementMobile) scoreElementMobile.innerText = score;
        }

        function generateBag() {
            let bag = [1, 2, 3, 4, 5, 6, 7];
            for (let i = bag.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [bag[i], bag[j]] = [bag[j], bag[i]];
            }
            return bag;
        }

        function fillBag() {
            while (pieceBag.length < 7) {
                pieceBag = pieceBag.concat(generateBag());
            }
        }

        function getNextPieceType() {
            fillBag();
            const nextPiece = pieceBag.shift();
            fillBag(); 
            return nextPiece;
        }

        function spawnPiece(typeIndex) {
            player.pieceIndex = typeIndex;
            player.matrix = JSON.parse(JSON.stringify(SHAPES[typeIndex]));
            player.pos.y = 0;
            player.pos.x = (Math.floor(COLS / 2)) - (Math.floor(player.matrix[0].length / 2));
            player.rot = 0; 

            if (collide(board, player)) {
                gameOver = true;
                showGameOver();
            }
        }

        function playerReset() {
            const type = getNextPieceType(); 
            spawnPiece(type);
            canHold = true;
            dropCounter = 0;
            lockCounter = 0;
        }

        function playerHold() {
            if (gameOver || isPaused || !canHold) return;

            if (holdPieceIndex === 0) {
                holdPieceIndex = player.pieceIndex;
                playerReset();
            } else {
                const temp = player.pieceIndex;
                spawnPiece(holdPieceIndex);
                holdPieceIndex = temp;
                dropCounter = 0;
                lockCounter = 0;
            }
            
            canHold = false;
            drawHold();
            drawNext();
        }

        function drawGrid(context, width, height, cols, rows, blockSize) {
            context.strokeStyle = '#2d3748';
            context.lineWidth = 1;
            for (let x = 0; x <= width; x += blockSize) {
                context.beginPath(); context.moveTo(x, 0); context.lineTo(x, height); context.stroke();
            }
            for (let y = 0; y <= height; y += blockSize) {
                context.beginPath(); context.moveTo(0, y); context.lineTo(width, y); context.stroke();
            }
        }

        function drawHoldPiece(ctx, canvas, isMobile) {
            if (!ctx || !canvas) return;
            ctx.fillStyle = '#1a202c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const blockSize = isMobile ? 12 : 20;
            drawGrid(ctx, canvas.width, canvas.height, 4, 4, canvas.width / 4);

            if (holdPieceIndex === 0) return;

            const matrix = SHAPES[holdPieceIndex];
            const offsetX = (canvas.width - matrix[0].length * blockSize) / 2;
            const offsetY = (canvas.height - matrix.length * blockSize) / 2;

            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = COLORS[value];
                        if(!canHold) ctx.fillStyle = '#4a5568';
                        ctx.fillRect(offsetX + x * blockSize + 1, offsetY + y * blockSize + 1, blockSize - 2, blockSize - 2);
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(offsetX + x * blockSize + 1, offsetY + y * blockSize + 1, blockSize - 2, 3);
                    }
                });
            });
        }

        function drawHold() {
            drawHoldPiece(holdCtx, holdCanvas, false);
            drawHoldPiece(holdCtxMobile, holdCanvasMobile, true);
        }

        function drawNextPieces(ctx, canvas, isMobile) {
            if (!ctx || !canvas) return;
            ctx.fillStyle = '#1a202c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#2d3748';
            ctx.beginPath(); ctx.moveTo(0, canvas.height / 3); ctx.lineTo(canvas.width, canvas.height / 3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, canvas.height / 3 * 2); ctx.lineTo(canvas.width, canvas.height / 3 * 2); ctx.stroke();

            const blockSize = isMobile ? 11 : 18;
            const sectionHeight = canvas.height / 3;

            for (let i = 0; i < 3; i++) {
                const pieceType = pieceBag[i];
                if (!pieceType) continue;
                
                const matrix = SHAPES[pieceType];
                const offsetX = (canvas.width - matrix[0].length * blockSize) / 2;
                const offsetY = sectionHeight * i + (sectionHeight - matrix.length * blockSize) / 2;

                matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            ctx.fillStyle = COLORS[value];
                            ctx.fillRect(offsetX + x * blockSize + 1, offsetY + y * blockSize + 1, blockSize - 2, blockSize - 2);
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(offsetX + x * blockSize + 1, offsetY + y * blockSize + 1, blockSize - 2, 3);
                        }
                    });
                });
            }
        }

        function drawNext() {
            drawNextPieces(nextCtx, nextCanvas, false);
            drawNextPieces(nextCtxMobile, nextCanvasMobile, true);
        }

        function draw() {
            ctx.fillStyle = '#1a202c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid(ctx, canvas.width, canvas.height, COLS, ROWS, BLOCK_SIZE);

            drawMatrix(board, {x: 0, y: 0});
            if(player.matrix && !gameOver && !isPaused) {
                drawMatrix(player.matrix, player.pos);
            }
            
            drawHold();
            drawNext();
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = COLORS[value];
                        ctx.fillRect((x + offset.x) * BLOCK_SIZE + 1,
                                     (y + offset.y) * BLOCK_SIZE + 1,
                                     BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                        
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect((x + offset.x) * BLOCK_SIZE + 1,
                                     (y + offset.y) * BLOCK_SIZE + 1,
                                     BLOCK_SIZE - 2, 4);
                    }
                });
            });
        }

        function collide(board, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        board[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y >= 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) {
                        continue outer;
                    }
                }

                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;

                score += rowCount * 100;
                rowCount *= 2;
            }
            updateScoreDisplay();
        }

        function checkGround() {
            player.pos.y++;
            const isGrounded = collide(board, player);
            player.pos.y--;
            return isGrounded;
        }

        function lockPiece() {
            merge(board, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
            lockCounter = 0;
        }

        function playerDrop() {
            if(gameOver || isPaused) return;
            
            if (!checkGround()) {
                player.pos.y++;
                dropCounter = 0;
            } else {
                lockPiece();
            }
        }

        function playerHardDrop() {
            if(gameOver || isPaused) return;
            while (!checkGround()) {
                player.pos.y++;
            }
            lockPiece();
            draw();
        }

        function playerMove(dir) {
            if(gameOver || isPaused) return;
            player.pos.x += dir;
            if (collide(board, player)) {
                player.pos.x -= dir;
            } else {
                lockCounter = 0;
            }
        }

        function rotateMatrix(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerRotate(dir) {
            if(gameOver || isPaused) return;
            
            if (player.pieceIndex === 6) return;

            const originalPos = { x: player.pos.x, y: player.pos.y };
            const prevRot = player.rot;
            const newRot = (player.rot + dir + 4) % 4;
            
            rotateMatrix(player.matrix, dir);

            const testKey = `${prevRot}_${newRot}`;
            const kicks = (player.pieceIndex === 2) ? WALL_KICKS.i_piece[testKey] : WALL_KICKS.normal[testKey];

            for (let i = 0; i < kicks.length; i++) {
                player.pos.x = originalPos.x + kicks[i].x;
                player.pos.y = originalPos.y + kicks[i].y;
                
                if (!collide(board, player)) {
                    player.rot = newRot;
                    lockCounter = 0; 
                    return;
                }
            }

            player.pos.x = originalPos.x;
            player.pos.y = originalPos.y;
            rotateMatrix(player.matrix, -dir);
        }

        function update(time = 0) {
            if (gameOver || isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            if (checkGround()) {
                lockCounter += deltaTime;
                if (lockCounter > lockDelay) {
                    lockPiece();
                }
            } else {
                lockCounter = 0;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    player.pos.y++;
                    dropCounter = 0;
                }
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        function showGameOver() {
            cancelAnimationFrame(animationId);
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
            finalScoreElement.innerText = score;
        }

        // リセット関連の関数
        function confirmReset() {
            if (gameOver) {
                startGame(); // ゲームオーバー時は確認なしで即リセット
                return;
            }
            isPaused = true; // ゲームを一時停止
            cancelAnimationFrame(animationId);
            resetConfirmDialog.classList.remove('hidden');
            resetConfirmDialog.classList.add('flex');
        }

        function executeReset() {
            resetConfirmDialog.classList.add('hidden');
            resetConfirmDialog.classList.remove('flex');
            isPaused = false;
            startGame();
        }

        function cancelReset() {
            resetConfirmDialog.classList.add('hidden');
            resetConfirmDialog.classList.remove('flex');
            isPaused = false;
            lastTime = performance.now(); // タイマーをリセットして再開
            update();
        }

        function startGame() {
            board = createMatrix(COLS, ROWS);
            score = 0;
            updateScoreDisplay();
            gameOver = false;
            isPaused = false;
            holdPieceIndex = 0;
            canHold = true;
            
            pieceBag = []; 
            fillBag(); 
            
            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            resetConfirmDialog.classList.add('hidden');
            resetConfirmDialog.classList.remove('flex');
            
            playerReset();
            drawHold();
            drawNext();
            
            dropCounter = 0;
            lockCounter = 0;
            lastTime = performance.now();
            update();
        }

        document.addEventListener('keydown', event => {
            if(gameOver || isPaused) return;
            if (event.key === 'ArrowLeft') {
                playerMove(-1);
            } else if (event.key === 'ArrowRight') {
                playerMove(1);
            } else if (event.key === 'ArrowDown') {
                playerDrop();
            } else if (event.key === 'ArrowUp') {
                playerHardDrop();
            } else if (event.key.toLowerCase() === 'x') {
                playerRotate(1);
            } else if (event.key.toLowerCase() === 'z') {
                playerRotate(-1);
            } else if (event.key.toLowerCase() === 'c' || event.key === 'Shift') {
                playerHold();
            }
        });

        let moveIntervalId = null;
        let dropIntervalId = null;

        function startAutoMove(dir) {
            if (moveIntervalId || isPaused) return;
            moveIntervalId = setInterval(() => playerMove(dir), 100);
        }
        function stopAutoMove() {
            clearInterval(moveIntervalId);
            moveIntervalId = null;
        }
        function startAutoDrop() {
            if (dropIntervalId || isPaused) return;
            dropIntervalId = setInterval(playerDrop, 50);
        }
        function stopAutoDrop() {
            clearInterval(dropIntervalId);
            dropIntervalId = null;
        }

        startGame();
    </script>
</body>
</html>
